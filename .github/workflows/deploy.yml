name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./server

    - name: Build Frontend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./client

    - name: Push Backend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

    - name: Push Frontend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/face-attendance-system01
          docker-compose pull
          docker-compose up -d --remove-orphans
